apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: codesleuth
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scaling : 0 a 3 instances maximum
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Timeout long pour les pipelines multi-agents (5 min)
        run.googleapis.com/execution-environment: gen2
    spec:
      # Timeout de la requete HTTP (300s = 5 min)
      timeoutSeconds: 300
      containers:
        - image: gcr.io/YOUR_PROJECT_ID/codesleuth:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            # Les secrets sont injectes depuis Google Secret Manager
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codesleuth-github-token
                  key: latest
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codesleuth-google-api-key
                  key: latest
            - name: CODESLEUTH_MODEL
              value: "gemini-2.5-flash"
